<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Dance Agency</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav {
            display: flex;
            flex-direction: row;
            gap: 15px;
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        nav a:hover {
            background: #555;
        }
        .mobile-nav {
            display: none;
        }
        .responsive {
            flex-wrap: wrap;
            justify-content: space-around;
        }
        main {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
        }
        @media (max-width: 600px) {
            nav {
                flex-direction: column;
                display: block;
            }
            .mobile-nav {
                display: block;
                background: #333;
                color: white;
                padding: 10px;
                cursor: pointer;
            }
            .mobile-nav ul {
                display: none;
                flex-direction: column;
                list-style: none;
                padding: 0;
            }
            .mobile-nav ul.show {
                display: flex;
            }
            nav a {
                padding: 10px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">Frequency Dance Agency</div>
        <div class="mobile-nav" onclick="toggleNav()">
            ☰ Menu
            <ul id="mobile-menu"> 
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#classes">Classes</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </div>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#classes">Classes</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>
    <main>
        <h1>Welcome to Frequency Dance Agency!</h1>
        <p>Experience the joy of dance.</p>
    </main>
    <footer>
        <p>&copy; 2026 Frequency Dance Agency</p>
    </footer>
    <script>
        function toggleNav() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('show');
        }
    </script>
</body>
</html>
