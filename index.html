<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Dance Agency | Kenya's Premier Dance Talent Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['Orbitron', 'sans-serif'],
                        'body': ['Nunito', 'sans-serif'],
                    },
                    colors: {
                        'frequency': {
                            50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74',
                            400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c',
                            800: '#9a3412', 900: '#7c2d12',
                        },
                        'neon': '#ccff00',
                        'deep': '#0f172a',
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'slide-up': 'slideUp 0.5s ease-out',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { transform: 'translateY(20px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 5px #ccff00, 0 0 10px #ccff00' },
                            '100%': { boxShadow: '0 0 20px #ccff00, 0 0 30px #ccff00' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #f97316 0%, #ccff00 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .active-section { display: block; animation: slideUp 0.5s ease-out; }
        .hidden-section { display: none; }
        .logo-container { background: #000000; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .leaderboard-rank { background: linear-gradient(135deg, #f97316, #ccff00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-family: 'Orbitron'; }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900">

    <nav class="fixed w-full z-50 glass-panel border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showSection('home')">
                <div class="logo-container w-12 h-12 border-2 border-frequency-500/50">
                    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/1000156082-QjqQ1X8QjqQ1X8.png" alt="Logo" class="w-full h-full object-contain p-1">
                </div>
                <div class="hidden sm:block">
                    <span class="font-display text-xl font-bold gradient-text block leading-none">FREQUENCY</span>
                    <span class="text-[10px] text-gray-400 tracking-[0.3em] uppercase">Dance Agency</span>
                </div>
            </div>
            
            <div class="hidden md:flex items-center space-x-6">
                <button onclick="showSection('home')" class="hover:text-frequency-400 font-bold text-sm">HOME</button>
                <button onclick="showSection('dancers')" class="hover:text-frequency-400 font-bold text-sm">DANCERS</button>
                <button onclick="showSection('leaderboard')" class="hover:text-frequency-400 font-bold text-sm">LEADERBOARD</button>
                <button onclick="showSection('book')" class="bg-frequency-500 px-6 py-2 rounded-full font-bold text-sm hover:scale-105 transition-all">BOOK NOW</button>
            </div>
        </div>
    </nav>

    <section id="home" class="active-section pt-20">
        <div class="relative h-[80vh] flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 z-0">
                <div class="absolute inset-0 bg-slate-900/60 z-10"></div>
                <img src="https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?w=1920&q=80" class="w-full h-full object-cover scale-110 animate-pulse-slow" alt="Background">
            </div>

            <div class="relative z-20 text-center px-4">
                <div class="logo-container w-32 h-32 md:w-48 md:h-48 mx-auto mb-8 border-4 border-frequency-500/30 animate-pulse-slow shadow-2xl">
                    <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/1000156082-QjqQ1X8QjqQ1X8.png" class="w-full h-full object-contain p-4">
                </div>
                <h1 class="font-display text-5xl md:text-8xl font-black mb-4">FEEL THE <span class="gradient-text">BEAT</span></h1>
                <p class="text-xl text-gray-300 max-w-2xl mx-auto mb-8">Kenya's premier hub for elite dance talent and world-class choreography.</p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button onclick="showSection('book')" class="bg-frequency-500 px-10 py-4 rounded-full font-bold text-lg shadow-lg shadow-frequency-500/40">Book Talent</button>
                    <button onclick="showSection('leaderboard')" class="glass-panel px-10 py-4 rounded-full font-bold text-lg border border-white/20">View Rankings</button>
                </div>
            </div>
        </div>
    </section>

    <section id="leaderboard" class="hidden-section pt-32 pb-20">
        <div class="max-w-5xl mx-auto px-4">
            <div class="text-center mb-16">
                <h2 class="font-display text-5xl font-bold mb-4">THE <span class="gradient-text">ELITE LIST</span></h2>
                <p class="text-gray-400 uppercase tracking-widest text-sm">Top Performers of the Month</p>
            </div>

            <div class="space-y-4" id="leaderboard-container">
                </div>
        </div>
    </section>

    <section id="book" class="hidden-section pt-32 pb-20">
        <div class="max-w-xl mx-auto px-4">
            <div class="glass-panel rounded-3xl p-8 md:p-12 border-frequency-500/20">
                <h2 class="font-display text-3xl font-bold text-center mb-8">RESERVE <span class="gradient-text">TALENT</span></h2>
                <form onsubmit="handleForm(event)" class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-gray-400 block mb-2 tracking-tighter">CLIENT NAME</label>
                        <input type="text" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-neon outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400 block mb-2 tracking-tighter">EVENT TYPE</label>
                        <select class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none">
                            <option class="bg-slate-900">Music Video</option>
                            <option class="bg-slate-900">Corporate Launch</option>
                            <option class="bg-slate-900">Live Concert</option>
                        </select>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-frequency-500 py-4 rounded-xl font-bold hover:bg-frequency-600 transition-all flex items-center justify-center gap-3">
                        SEND BOOKING REQUEST <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/90 px-4">
        <div class="glass-panel p-10 rounded-3xl max-w-sm text-center border-neon/50">
            <div class="w-20 h-20 bg-neon/10 rounded-full flex items-center justify-center mx-auto mb-6 text-neon text-4xl border border-neon/30">
                <i class="fas fa-check"></i>
            </div>
            <h3 class="font-display text-2xl font-bold mb-2">REQUEST SENT</h3>
            <p class="text-gray-400 mb-8">Frequency agents will contact you shortly to finalize details.</p>
            <button onclick="closeModal()" class="w-full bg-white text-black font-black py-3 rounded-lg">DISMISS</button>
        </div>
    </div>

    <script>
        const topDancers = [
            { name: "Vicky 'The Flash'", points: "15,400", category: "Afro-Fusion", image: "https://images.unsplash.com/photo-1535533331324-75d5021c1a32?w=400&q=80" },
            { name: "Urban Kings", points: "14,200", category: "Hip Hop Crew", image: "https://images.unsplash.com/photo-1547153760-18fc86324498?w=400&q=80" },
            { name: "Shani", points: "12,950", category: "Contemporary", image: "https://images.unsplash.com/photo-1518834107812-67b0b7c58434?w=400&q=80" }
        ];

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-section'));
            document.querySelectorAll('section').forEach(s => s.classList.remove('active-section'));
            const target = document.getElementById(id);
            target.classList.remove('hidden-section');
            target.classList.add('active-section');
            window.scrollTo(0,0);
            if(id === 'leaderboard') renderLeaderboard();
        }

        function renderLeaderboard() {
            const container = document.getElementById('leaderboard-container');
            container.innerHTML = topDancers.map((d, i) => `
                <div class="glass-panel p-4 md:p-6 rounded-2xl flex items-center gap-6 group hover:border-neon/50 transition-all">
                    <div class="leaderboard-rank text-3xl md:text-4xl font-black w-12">#${i+1}</div>
                    <div class="relative">
                        <img src="${d.image}" class="w-16 h-16 md:w-20 md:h-20 rounded-full object-cover border-2 border-frequency-500">
                        ${i === 0 ? '<div class="absolute -top-2 -right-2 bg-neon text-black text-[10px] font-bold px-2 py-1 rounded-full">MVP</div>' : ''}
                    </div>
                    <div class="flex-grow">
                        <h4 class="font-display font-bold text-lg md:text-xl flex items-center gap-2">
                            ${d.name} <i class="fas fa-check-circle text-blue-400 text-xs"></i>
                        </h4>
                        <p class="text-gray-500 text-sm uppercase font-bold tracking-tighter">${d.category}</p>
                    </div>
                    <div class="text-right">
                        <div class="text-neon font-display font-bold">${d.points}</div>
                        <div class="text-[10px] text-gray-500">VIBE POINTS</div>
                    </div>
                </div>
            `).join('');
        }

        function handleForm(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fas fa-circle-notch animate-spin"></i> TRANSMITTING...';
            btn.disabled = true;
            
            setTimeout(() => {
                document.getElementById('successModal').style.display = 'flex';
                btn.innerHTML = 'SEND BOOKING REQUEST <i class="fas fa-paper-plane text-sm"></i>';
                btn.disabled = false;
                e.target.reset();
            }, 2000);
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        // Initializing Leaderboard
        renderLeaderboard();
        // EMERGENCY FIX: Prevent button from getting stuck
        document.getElementById('submitBtn').addEventListener('click', function(e) {
            // If button is clicked and files aren't ready, auto-reset after 3 seconds
            setTimeout(() => {
                if (this.disabled && (!window.tempPhoto || !window.tempVideo)) {
                    console.log('Emergency reset triggered');
                    this.disabled = false;
                    this.classList.remove('processing');
                    this.textContent = 'Complete Registration';
                    document.getElementById('formLoader').classList.remove('active');
                    showToast('Please upload both photo and video first!', 'error');
                }
            }, 3000);
        });

    </script>
</body>
</html>
