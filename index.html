<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frequency Dance Agency | Kenya's Premier Dance Talent Hub</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg,#0f172a,#581c87,#0f172a);
  color: white;
  font-family: system-ui, sans-serif;
}

.hidden-section { display:none; }
.active-section { display:block; animation: fadeIn .4s ease; }

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="fixed w-full z-50 glass">
  <div class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center">
    
    <div onclick="showSection('home')" class="font-bold text-xl cursor-pointer">
      FREQUENCY
    </div>

    <div class="hidden md:flex gap-6">
      <button class="nav-btn" data-section="home" onclick="showSection('home')">Home</button>
      <button class="nav-btn" data-section="dancers" onclick="showSection('dancers')">Dancers</button>
      <button class="nav-btn" data-section="book" onclick="showSection('book')">Book</button>
    </div>

    <button class="md:hidden" onclick="toggleMobileMenu()">
      <i id="menu-icon" class="fas fa-bars text-xl"></i>
    </button>
  </div>

  <!-- MOBILE MENU -->
  <div id="mobile-menu" class="hidden md:hidden glass p-4 space-y-2">
    <button class="block w-full text-left" onclick="showSection('home')">Home</button>
    <button class="block w-full text-left" onclick="showSection('dancers')">Dancers</button>
    <button class="block w-full text-left" onclick="showSection('book')">Book</button>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="active-section pt-24 text-center">
  <h1 class="text-5xl font-black mb-4">FEEL THE BEAT</h1>
  <p class="text-gray-300 mb-8">Kenya's hottest dance agency.</p>

  <div class="flex gap-4 justify-center flex-wrap">
    <button onclick="showSection('book')" class="bg-orange-500 px-6 py-3 rounded-full font-bold">
      Book Talent
    </button>
    <button onclick="showSection('dancers')" class="glass px-6 py-3 rounded-full font-bold">
      View Dancers
    </button>
  </div>
</section>

<!-- DANCERS -->
<section id="dancers" class="hidden-section pt-24 max-w-6xl mx-auto px-4">
  <h2 class="text-3xl font-bold text-center mb-6">Solo Artists</h2>

  <!-- FILTERS -->
  <div class="flex flex-wrap gap-3 justify-center mb-8">
    <button class="filter-btn bg-orange-500 px-4 py-2 rounded-full" onclick="filterDancers('all')">All</button>
    <button class="filter-btn glass px-4 py-2 rounded-full" onclick="filterDancers('afrobeat')">Afrobeat</button>
    <button class="filter-btn glass px-4 py-2 rounded-full" onclick="filterDancers('hiphop')">Hip Hop</button>
    <button class="filter-btn glass px-4 py-2 rounded-full" onclick="filterDancers('dancehall')">Dancehall</button>
  </div>

  <!-- GRID -->
  <div id="dancers-grid" class="grid md:grid-cols-3 gap-6"></div>
</section>

<!-- BOOK -->
<section id="book" class="hidden-section pt-24 max-w-xl mx-auto px-4 text-center">
  <h2 class="text-3xl font-bold mb-4">Quick Booking</h2>
  <p class="text-gray-400 mb-6">Tap below to book instantly via WhatsApp.</p>

  <button onclick="bookViaWhatsApp('General Inquiry')"
    class="bg-green-500 px-8 py-4 rounded-full font-bold text-lg">
    Book via WhatsApp
  </button>
</section>

<!-- TOAST -->
<div id="toast-container" class="fixed bottom-6 right-6 z-50"></div>

<script>
// ================= NAVIGATION =================
function showSection(id, updateURL=true) {
  document.querySelectorAll("section").forEach(sec=>{
    sec.classList.remove("active-section");
    sec.classList.add("hidden-section");
  });

  document.getElementById(id)?.classList.remove("hidden-section");
  document.getElementById(id)?.classList.add("active-section");

  if(updateURL) location.hash=id;

  document.getElementById("mobile-menu").classList.add("hidden");
}

// load from URL
window.addEventListener("load", ()=>{
  const hash = location.hash.replace("#","");
  if(hash) showSection(hash,false);
});

// ================= MOBILE MENU =================
function toggleMobileMenu(){
  document.getElementById("mobile-menu").classList.toggle("hidden");
  document.getElementById("menu-icon").classList.toggle("fa-times");
}

// ================= TOAST =================
function showToast(msg){
  const toast=document.createElement("div");
  toast.className="bg-orange-500 px-6 py-3 rounded-xl shadow-xl mb-2";
  toast.innerText=msg;
  document.getElementById("toast-container").appendChild(toast);
  setTimeout(()=>toast.remove(),3000);
}

// ================= DANCER DATA =================
const dancers=[
  {name:"Viper",style:"afrobeat",rating:4.9,price:"KES 8,000"},
  {name:"Nia Flame",style:"hiphop",rating:4.8,price:"KES 6,500"},
  {name:"Sky Motion",style:"dancehall",rating:5.0,price:"KES 9,000"}
];

// ================= RENDER =================
function renderDancers(filter="all"){
  const grid=document.getElementById("dancers-grid");
  grid.innerHTML="";

  const list=filter==="all"
    ? dancers
    : dancers.filter(d=>d.style===filter);

  if(!list.length){
    grid.innerHTML='<p class="text-gray-400">No dancers found</p>';
    return;
  }

  list.forEach(d=>{
    grid.innerHTML+=`
      <div class="glass p-6 rounded-2xl text-center">
        <h3 class="text-xl font-bold mb-2">${d.name}</h3>
        <p class="text-orange-400 capitalize">${d.style}</p>
        <p class="text-sm text-gray-400 mb-4">⭐ ${d.rating}</p>
        <button onclick="bookViaWhatsApp('${d.name}')"
          class="w-full bg-orange-500 py-2 rounded-full font-bold">
          Book Now
        </button>
      </div>
    `;
  });
}

// ================= FILTER =================
function filterDancers(style){
  renderDancers(style);
}

// ================= WHATSAPP =================
function bookViaWhatsApp(name){
  const phone="254114554471"; // 🔴 CHANGE IF NEEDED
  const msg=encodeURIComponent(
    `Hello Frequency Dance Agency, I want to book ${name}.`
  );
  window.open(`https://wa.me/${phone}?text=${msg}`,"_blank");
}

// INITIAL LOAD
renderDancers();
</script>

</body>
</html>
